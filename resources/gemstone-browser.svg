<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- GemStone Explorer icon: the real GemStone gem artwork
       (resources/gemstone-icon.png, embedded) at full size, with a small open
       book overlaid bottom-right to signal "browse". -->
  <image x="0" y="0" width="24" height="24" preserveAspectRatio="xMidYMid meet"
         href="data:image/png;base64,"/>
  <g transform="translate(9.24,5.06) scale(0.73)">
    <!-- faint halo so the book lifts off the gem -->
    <path d="M12 17.6 C10.5 16.6 8.5 16.4 6.5 16.8 L6.5 21 C8.5 20.6 10.5 20.8 12 21.8 C13.5 20.8 15.5 20.6 17.5 21 L17.5 16.8 C15.5 16.4 13.5 16.6 12 17.6 Z"
          fill="#ffffff" fill-opacity="0.9" stroke="#ffffff" stroke-width="2.4" stroke-opacity="0.55" stroke-linejoin="round"/>
    <!-- book: white pages, dark cover/spine -->
    <path d="M12 17.6 C10.5 16.6 8.5 16.4 6.5 16.8 L6.5 21 C8.5 20.6 10.5 20.8 12 21.8 C13.5 20.8 15.5 20.6 17.5 21 L17.5 16.8 C15.5 16.4 13.5 16.6 12 17.6 Z"
          fill="#fcfcfc" stroke="#222222" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M12 17.6 L12 21.8" fill="none" stroke="#222222" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
